<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TCG Legacy</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d1117;
        color: #f6f0df;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 25% 20%, rgba(197, 160, 83, 0.22), transparent 26rem),
          linear-gradient(135deg, #101820 0%, #17110d 54%, #0d1117 100%);
      }

      main {
        width: min(92vw, 720px);
        padding: 48px;
        border: 1px solid rgba(246, 240, 223, 0.16);
        border-radius: 8px;
        background: rgba(13, 17, 23, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.4rem, 7vw, 5.8rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      p {
        max-width: 42rem;
        margin: 0;
        color: #d8cdae;
        font-size: 1.1rem;
        line-height: 1.65;
      }

      .tag {
        display: inline-block;
        margin-bottom: 18px;
        color: #e2b45f;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      @media (max-width: 560px) {
        main {
          padding: 32px 24px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <span class="tag">Demo online</span>
      <h1>TCG Legacy</h1>
      <p>Proyecto inicial desplegado para validacion publica. Listo para convertirse en la demo jugable cuando toque meterle cartas, reglas y chispa.</p>
    </main>
  </body>
</html>
